<h1>Meal Finder</h1>

<input
type="text"
placeholder="Buscar comida"
(input)="search($event)"
>

<div class="meals-container">

<div *ngFor="let meal of meals" class="meal-card">

<h3>{{meal.strMeal}}</h3>

<img
[src]="meal.strMealThumb"
width="150"
>

<br>

<button (click)="openModal(meal)">
Ver receta
</button>

</div>

</div>

<app-modal
*ngIf="selectedMeal"
[meal]="selectedMeal"
(close)="closeModal()">
</app-modal>
